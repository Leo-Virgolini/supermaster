# ===============================
# Desarrollo local
# ===============================
# tinyInt1isBit=false → el driver MySQL reporta todos los TINYINT como TINYINT
# (no como BIT). Necesario para que Hibernate (con preferred_boolean_jdbc_type=TINYINT)
# valide ok contra columnas TINYINT sin display width.
spring.datasource.url=jdbc:mysql://localhost:3306/supermaster?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Argentina/Buenos_Aires&characterEncoding=UTF-8&tinyInt1isBit=false
spring.datasource.username=root
spring.datasource.password=admin
# ===============================
# DevTools
# ===============================
spring.devtools.restart.enabled=true
# ===============================
# Directorios locales
# ===============================
app.secrets-dir=C:/ProgramData/SuperMaster/secrets
app.imagenes-dir=G:/.shortcut-targets-by-id/1O_lJSVDiXSJ37_IgSVh5AScFhc-hBWPt/IMAGENES/
# ===============================
# JWT
# ===============================
jwt.access-token-expiration-ms=43200000
