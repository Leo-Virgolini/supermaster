spring.application.name=super-master-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# ===============================
# Configuracion de la base de datos MySQL (HikariCP)
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
# 5 min: imports masivos (enriquecimiento de productos, migración Excel) pueden tomar
# una conexión por bastante tiempo en una sola @Transactional. 60s era demasiado bajo
# y disparaba false-positives. 5 min sigue siendo suficiente para detectar leaks reales.
spring.datasource.hikari.leak-detection-threshold=300000
# auto-commit=false complementa hibernate.connection.provider_disables_autocommit
# (sin esto, Hikari abre conexiones en autoCommit=true y rompe rollback en errores).
spring.datasource.hikari.auto-commit=false
# ===============================
# Configuracion de JPA / Hibernate
# ===============================
# validate: no modifica el schema, pero al arrancar verifica que las tablas
# y columnas de las @Entity existan en MySQL. Si falta algo, el backend
# NO arranca y tira error claro. Asegura que no haya drift dev↔schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
# ===============================
# Optimizacion: Batch Inserts + autocommit-off (mejor throughput con Hikari)
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
# Mapear Boolean a TINYINT (default historico MySQL). Hibernate 6+ cambio el
# default a BIT, lo que rompe validate sobre schemas existentes que usan TINYINT.
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=TINYINT
# ===============================
# Configuracion de Multipart (archivos)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
# ===============================
# Configuracion de Tomcat
# ===============================
server.max-http-request-header-size=32KB
server.tomcat.max-http-response-header-size=32KB
server.tomcat.max-swallow-size=10MB
server.tomcat.connection-timeout=20s
server.tomcat.keep-alive-timeout=60s
# Whitelabel desactivado: GlobalExceptionHandler ya maneja todos los errores
server.error.whitelabel.enabled=false
# Compresion HTTP (responses grandes de listados/Excel/PDF)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
# Shutdown ordenado (drena requests en curso antes de cerrar)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
# ===============================
# Virtual Threads (Project Loom - Java 25)
# ===============================
spring.threads.virtual.enabled=true
# ===============================
# Jackson (timezone consistente con MySQL serverTimezone)
# ===============================
spring.jackson.time-zone=America/Argentina/Buenos_Aires
# ===============================
# CORS (configurable por profile; en LAN puede quedar permisivo)
# ===============================
app.cors.allowed-origins=*
# ===============================
# Actuator (puerto separado 8081, no expuesto al frontend)
# ===============================
management.server.port=8081
management.endpoints.web.exposure.include=health,info,loggers,metrics,mappings
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
# ===============================
# OpenAI (generación de SEO de Tienda Nube con IA)
# La API key NO va acá: se carga de openai_tokens.json en app.secrets-dir.
# ===============================
openai.base-url=https://api.openai.com/v1
openai.model=gpt-5-mini
# Precios USD por millón de tokens (para estimar el costo del uso). Ajustar si cambia el plan/modelo.
openai.precio-input-1m=0.25
openai.precio-output-1m=2.00
# OpenAI imágenes (carátula): key en openai_image_tokens.json (app.secrets-dir), NO acá.
openai.image.base-url=https://api.openai.com/v1
openai.image.model=gpt-image-2
openai.image.precio-input-1m=5.00
openai.image.precio-output-1m=40.00
