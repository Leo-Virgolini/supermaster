spring.application.name=super-master-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# ===============================
# Configuracion de la base de datos MySQL (HikariCP)
# ===============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.leak-detection-threshold=60000
# auto-commit=false complementa hibernate.connection.provider_disables_autocommit
# (sin esto, Hikari abre conexiones en autoCommit=true y rompe rollback en errores).
spring.datasource.hikari.auto-commit=false
# ===============================
# Configuracion de JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
# ===============================
# Optimizacion: Batch Inserts + autocommit-off (mejor throughput con Hikari)
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
# ===============================
# Configuracion de Multipart (archivos)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
# ===============================
# Configuracion de Tomcat
# ===============================
server.max-http-request-header-size=32KB
server.tomcat.max-http-response-header-size=32KB
server.tomcat.max-swallow-size=10MB
server.tomcat.connection-timeout=20s
server.tomcat.keep-alive-timeout=60s
# Whitelabel desactivado: GlobalExceptionHandler ya maneja todos los errores
server.error.whitelabel.enabled=false
# Compresion HTTP (responses grandes de listados/Excel/PDF)
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
# Shutdown ordenado (drena requests en curso antes de cerrar)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
# ===============================
# Virtual Threads (Project Loom - Java 25)
# ===============================
spring.threads.virtual.enabled=true
# ===============================
# Jackson (timezone consistente con MySQL serverTimezone)
# ===============================
spring.jackson.time-zone=America/Argentina/Buenos_Aires
# ===============================
# CORS (configurable por profile; en LAN puede quedar permisivo)
# ===============================
app.cors.allowed-origins=*
# ===============================
# Actuator (puerto separado 8081, no expuesto al frontend)
# ===============================
management.server.port=8081
management.endpoints.web.exposure.include=health,info,loggers,metrics,mappings
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
