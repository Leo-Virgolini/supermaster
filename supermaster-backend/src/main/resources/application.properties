spring.application.name=super-master-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
# ===============================
# Configuracion de la base de datos MySQL
# ===============================
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=20
# ===============================
# Configuracion de JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
# ===============================
# Optimizacion: Batch Inserts
# ===============================
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# ===============================
# Configuracion de Multipart (archivos)
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# ===============================
# Configuracion de Spring
# ===============================
#spring.main.allow-bean-definition-overriding=true
# ===============================
# Configuracion de Tomcat
# ===============================
server.max-http-request-header-size=32KB
server.tomcat.max-http-response-header-size=32KB
# ===============================
# Virtual Threads (Project Loom - Java 25)
# ===============================
spring.threads.virtual.enabled=true
# ===============================
# Actuator (puerto separado 8081, no expuesto al frontend)
# ===============================
management.server.port=8081
management.endpoints.web.exposure.include=health,info,loggers,metrics,mappings
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
