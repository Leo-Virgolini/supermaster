<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="7" fill="#f8fafc"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#e2e8f0" stroke-width="1"/>
  <!-- S (extrabold) -->
  <text x="16" y="16" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="17" fill="#1f2937" text-anchor="middle" dominant-baseline="central" dx="-6">S</text>
  <!-- M (extrabold azul) -->
  <text x="16" y="16" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="17" fill="#2563eb" text-anchor="middle" dominant-baseline="central" dx="6">M</text>
  <!-- Reflejo animado con SMIL -->
  <g clip-path="url(#clip)">
    <rect x="-20" y="-5" width="16" height="42" fill="url(#shine)" transform="rotate(20)">
      <animateTransform attributeName="transform" type="translate" values="-20,0;52,0;52,0" keyTimes="0;0.4;1" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
